name: Trivy Scanner - Container Images
on:
  schedule:
    - cron: '0 */24 * * *'

permissions:
  contents: read
  security-events: write # Update findings in security tab

jobs:
  trivy-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Get driver image tag
        id: image
        run: echo "tag=v$(yq '.appVersion' charts/aws-ebs-csi-driver/Chart.yaml)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@cabfdba3510de1431bac9dba27511d97497fc100  # v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHubCI
          aws-region: us-east-1
          role-duration-seconds: 1800
          role-skip-session-tagging: true

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a  # v2
        with:
          registry-type: public

      - name: Pull container image
        run: docker pull public.ecr.aws/ebs-csi-driver/aws-ebs-csi-driver:${{ steps.image.outputs.tag }}

      - name: Scan container image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db
        with:
          image-ref: 'public.ecr.aws/ebs-csi-driver/aws-ebs-csi-driver:${{ steps.image.outputs.tag }}'
          output: 'results.sarif'
          format: 'sarif'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61  # v4
        with:
          sarif_file: 'results.sarif'
