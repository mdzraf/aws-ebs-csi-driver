name: Unit Tests
on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  
jobs:
  buildx:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version-file: 'go.mod'

      - name: Run tests
        run: |
          go test -v ./cmd/... ./pkg/...
